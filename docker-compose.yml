services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: http://localhost:8080
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
      LEAN_ROOT: /app/lean
      LEAN_CLI_PATH: lean
    volumes:
      - ./lean:/app/lean
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3000:3000"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "8080:80"
