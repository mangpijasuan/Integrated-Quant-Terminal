
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMINI // QUANT TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ffb800;
            --success: #00ff9d;
            --danger: #ff2e63;
            --bg: #020204;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #ffffff;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* Modern Grid Background */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: 
                linear-gradient(rgba(255, 184, 0, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 184, 0, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: -1;
        }

        .mono { font-family: 'IBM Plex Mono', monospace; }
        .serif { font-family: 'Playfair Display', serif; }
        
        .glass-card {
            background: rgba(10, 10, 15, 0.5);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 184, 0, 0.05);
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-card:hover {
            border-color: rgba(255, 184, 0, 0.15);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        .text-glow {
            text-shadow: 0 0 20px rgba(255, 184, 0, 0.2);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 184, 0, 0.1); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255, 184, 0, 0.3); }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(255, 184, 0, 0.3); }
            70% { box-shadow: 0 0 0 10px rgba(255, 184, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 184, 0, 0); }
        }

        .neural-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse-gold 2s infinite;
        }

        /* Scanline Overlay */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.1;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "recharts": "https://esm.sh/recharts@^3.6.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div class="scanlines"></div>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
